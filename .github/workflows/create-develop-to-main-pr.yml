name: Create develop to main PR

on:
  push:
    branches:
      - develop
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branch refs
        run: git fetch origin main develop

      - name: Create develop to main PR when needed
        env:
          GH_TOKEN: ${{ secrets.PR_CREATOR_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $existingPr = gh pr list --base main --head develop --state open --json number --jq '.[0].number'
          if ($existingPr) {
            Write-Host "An open develop -> main PR already exists: #$existingPr"
            exit 0
          }

          $aheadCount = git rev-list --count origin/main..origin/develop
          if ([int]$aheadCount -le 0) {
            Write-Host 'develop is not ahead of main. No PR will be created.'
            exit 0
          }

          $commitSummary = git log --no-merges --pretty=format:'- %h %s' origin/main..origin/develop
          if (-not $commitSummary) {
            $commitSummary = '- No non-merge commits found in the compare range.'
          }

          $body = @"
          ## Summary
          This automated PR promotes the current `develop` branch into `main`.

          ## Included commits
          $commitSummary

          ## Notes
          - This PR was created automatically because `develop` is ahead of `main`.
          - The workflow skips creation when there is no branch diff or when an open `develop -> main` PR already exists.
          - Reviewers should validate release readiness before merging.
          "@

          gh pr create `
            --base main `
            --head develop `
            --title "Release develop into main" `
            --body $body
