services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/condo_app
      - JWT_SECRET=change_me_in_production
      - CLIENT_URL=http://localhost:5000
      - GOOGLE_CALLBACK_URL=http://localhost:5000/api/auth/google/callback
      - MICROSOFT_CALLBACK_URL=http://localhost:5000/api/auth/microsoft/callback
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - FORCE_IPV4=true

      # Reporting provider selection (mysql | mongo)
      - REPORTING_PROVIDER=mysql

      # MySQL / MariaDB reporting DB
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=condo_mgmt
      - MYSQL_USER=condo_app
      - MYSQL_PASSWORD=condo_app_pw
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" mongodb://localhost:27017/admin | grep 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    env_file:
      - ./.env.docker
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=condo_mgmt
      - MYSQL_USER=condo_app
      - MYSQL_PASSWORD=condo_app_pw
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/db/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s

volumes:
  mongo-data:
  mysql-data:
