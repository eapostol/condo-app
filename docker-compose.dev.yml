services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5001:5000"
    env_file:
      - ./server/.env.docker
    environment:
      - NODE_ENV=development
      - SEED_ON_START=true
      - MICROSOFT_CALLBACK_URL=http://localhost:5000/api/auth/microsoft/callback
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - FORCE_IPV4=true
      # Helps file watching behave on some Windows/Mac setups
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=200
    volumes:
      - ./server:/app/server
      - api_node_modules:/app/server/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=200
      # Explicitly point the Vite client at the API service as exposed by docker-compose (host port 5001 -> api:5000)
      - VITE_API_URL=http://localhost:5001/api
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    depends_on:
      - api

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" mongodb://localhost:27017/admin | grep 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=condo_mgmt
      - MYSQL_USER=condo_app
      - MYSQL_PASSWORD=condo_app_pw
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/db/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  api_node_modules:
  client_node_modules:
  mongo-data:
  mysql-data:
